<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Rock Paper Scissors</h1>
        </div>
        <div class="line"></div>
        <div class="main">
            <div id = "rock" class="rock btn">
                <img src="images/fist.png" alt="">
            </div>
            <div id="paper" class="paper btn">
                <img src="images/paper.png" alt="">
            </div>
            <div id="scissors" class="scissors btn">
                <img src="images/scissors (1).png" alt="">
            </div>
        </div>
         <div class="line"></div>
        <div class="result">
            <p id="result">Choose Your Move to go against the Computer</p>
        </div>
        <div class="score">
            <p>
                Wins:
            </p>
            <p>
                Tie:
            </p>
            <p>
                Looses:
            </p>
        </div>
        <button id="reset-score" class="reset btn">Reset Score</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
